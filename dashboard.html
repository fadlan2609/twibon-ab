<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Twibbon App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>Twibbon App</h2>
            <div class="nav-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="create.html">Buat Twibbon</a>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="data-actions">
                <button onclick="exportData()" class="btn-export">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export Data
                </button>
                <button onclick="importData()" class="btn-import">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Import Data
                </button>
            </div>
        </div>
        
        <div class="twibbon-list">
            <h2>Twibbon Anda</h2>
            <div id="twibbonGrid" class="twibbon-grid">
                <!-- Twibbon akan ditampilkan di sini -->
            </div>
        </div>
    </div>

    <!-- Modal untuk Import -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h3>Import Data Twibbon</h3>
            <p>Pilih file backup yang sebelumnya diexport</p>
            <input type="file" id="importFile" accept=".json">
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Batal</button>
                <button onclick="processImport()" class="btn-confirm">Import</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
