<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Twibbon - Twibbon App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>Twibbon App</h2>
            <div class="nav-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="create.html">Buat Twibbon</a>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h1>Buat Twibbon Baru</h1>
        
        <div class="create-form">
            <div class="form-group">
                <label for="twibbonName">Nama Twibbon:</label>
                <input type="text" id="twibbonName" placeholder="Contoh: Twibbon 17 Agustus" required>
            </div>
            
            <div class="form-group">
                <label for="twibbonImage">Upload Twibbon (background transparan):</label>
                <input type="file" id="twibbonImage" accept="image/*" required>
                <small>Upload file PNG dengan background transparan</small>
            </div>
            
            <div class="preview-container">
                <h3>Preview:</h3>
                <canvas id="previewCanvas"></canvas>
            </div>
            
            <button onclick="createTwibbon()" class="btn-create">Buat Twibbon & Generate Link</button>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        let uploadedImage = null;

        document.getElementById('twibbonImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImage = event.target.result;
                    previewImage();
                };
                reader.readAsDataURL(file);
            }
        });

        function previewImage() {
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                canvas.width = 300;
                canvas.height = 300;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, 300, 300);
            };
            
            img.src = uploadedImage;
        }

        function createTwibbon() {
            const name = document.getElementById('twibbonName').value;
            
            if (!name || !uploadedImage) {
                alert('Harap isi semua field!');
                return;
            }
            
            // Generate unique ID
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            
            // Simpan ke localStorage
            const twibbons = JSON.parse(localStorage.getItem('twibbons') || '[]');
            twibbons.push({
                id: id,
                name: name,
                image: uploadedImage,
                generateLink: `generate.html?id=${id}`,
                createdAt: new Date().toISOString()
            });
            
            localStorage.setItem('twibbons', JSON.stringify(twibbons));
            
            alert('Twibbon berhasil dibuat! Link telah tersedia di dashboard.');
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
